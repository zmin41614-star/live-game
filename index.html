<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Interactive Game</title>
    <!-- Server နှင့် တန်းချိတ်ဆက်ရန် WebSocket Client Script -->
    <script src="https://socket.io"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> TikTok Live Game</h1>
            <p class="subtitle">Interactive Voting Game</p>
        </div>

        <div class="status-badge" id="statusBadge"> Disconnected</div>

        <div class="setup-area" id="setupArea">
            <h3>Setup TikTok Live Connection</h3>
            <div class="input-group">
                <label>TikTok Username:</label>
                <input type="text" id="usernameInput" value="min.zin907" placeholder="@your_tiktok_username">
            </div>
            <div class="input-group">
                <label>Select Game Mode:</label>
                <select id="gameMode">
                    <option value="voting">Voting Game</option>
                </select>
            </div>
            <button class="btn" id="connectBtn" onclick="startConnection()">CONNECT & START GAME</button>
        </div>

        <div class="vote-results" id="voteResults" style="display:none;">
            <h3> Live Vote Progress</h3>
            <div class="vote-bar">
                <div class="vote-label"><span> Red</span> <span id="redCount">0 မဲ</span></div>
                <div class="bar-bg"><div class="bar-fill red-fill" id="redBar"></div></div>
            </div>
            <div class="vote-bar">
                <div class="vote-label"><span> Blue</span> <span id="blueCount">0 မဲ</span></div>
                <div class="bar-bg"><div class="bar-fill blue-fill" id="blueBar"></div></div>
            </div>
            <div class="vote-bar">
                <div class="vote-label"><span> Yellow</span> <span id="yellowCount">0 မဲ</span></div>
                <div class="bar-bg"><div class="bar-fill yellow-fill" id="yellowBar"></div></div>
            </div>
            <div class="vote-bar">
                <div class="vote-label"><span> Green</span> <span id="greenCount">0 မဲ</span></div>
                <div class="bar-bg"><div class="bar-fill green-fill" id="greenBar"></div></div>
            </div>
            <div class="viewer-count" id="viewerCountDisplay">Connected Viewers: 0</div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="tiktok-api.js"></script>
    <script src="websocket-client.js"></script>
    <script src="script.js"></script>
</body>
</html>
